name = "islamic-content-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
workers_dev = false

[vars]
ALLOWED_ORIGINS = "*"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "islamic-content"
preview_bucket_name = "islamic-content"

[[routes]]
pattern = "api.islam.bader.solutions"
custom_domain = true